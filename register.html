<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UustBook — Регистрация</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/book-open-cover.png" alt="UustBook logo">
      <h1>UustBook</h1>
    </div>
    <nav>
      <a href="index.html">Главная</a>
      <a href="groups.html">Сообщества</a>
      <a href="library.html">Библиотека</a>
    </nav>
  </header>

  <main class="content">
    <div class="auth-form">
      <h2>Регистрация</h2>
      <div id="errorMessage" class="error-message" style="display: none;"></div>
      <div id="successMessage" class="success-message" style="display: none;"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="fullname">ФИО:</label>
          <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Пароль:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Подтвердите пароль:</label>
          <input type="password" id="confirm-password" name="confirm-password" required>
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
      </form>
      <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>

  <footer>
    <p>© 2026 UustBook</p>
  </footer>

  <script src="database.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Пароли не совпадают';
        errorDiv.style.display = 'block';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 3000);
        return;
      }

      try {
        await db.registerUser({ fullname, email, password });
        successDiv.textContent = 'Регистрация успешна! Перенаправляем на страницу входа...';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>
</html>
